<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cái Tiệm Tạp Hóa Này</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial; background:#f5f5f5;}
header { background:black;color:white;padding:15px;text-align:center;font-size:20px;}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:10px;
}

.detail {
  display:none;
  padding:15px;
  background:white;
}

.btn {
  display:block;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.shopee { background:#ff5722;color:white;}
.tiktok { background:black;color:white;}

iframe {
  width:100%;
  height:300px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🔥 Cái Tiệm Tạp Hóa Này</header>

<div class="grid" id="productList"></div>

<div id="detailBox" class="detail"></div>

<script src="products.js"></script>

<script>
// tự động convert link TikTok → embed
function convertTikTok(url){
  const match = url.match(/video\/(\d+)/);
  return match ? "https://www.tiktok.com/embed/" + match[1] : url;
}

const list = document.getElementById("productList");
const detail = document.getElementById("detailBox");

// hiển thị sản phẩm
products.forEach(p => {
  list.innerHTML += `
    <div class="card" onclick="showDetail(${p.id})">
      <img src="${p.image}">
      <p>${p.name}</p>
    </div>
  `;
});

// hiển thị chi tiết
function showDetail(id){
  const p = products.find(x => x.id === id);

  const videoLink = convertTikTok(p.video);

  detail.style.display = "block";
  detail.innerHTML = `
    <h2>${p.name}</h2>
    <iframe src="${videoLink}"></iframe>
    <p>${p.desc}</p>

    <button class="btn shopee" onclick="window.open('${p.shopee}')">
      Mua trên Shopee
    </button>

    <button class="btn tiktok" onclick="window.open('${p.tiktok}')">
      Mua trên TikTok
    </button>
  `;
}
</script>

</body>
</html>

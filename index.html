<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Yến Thảo Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f5f5f5;}
header { background:black;color:white;padding:15px;text-align:center;}
.grid { display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card { background:white;padding:10px;border-radius:10px;text-align:center;cursor:pointer;}
.card img { width:100%; border-radius:10px;}
.detail { display:none;padding:15px;background:white;}
.btn { padding:10px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.shopee { background:#ff5722;color:white;}
.tiktok { background:black;color:white;}
</style>

</head>
<body>

<header>🔥 Cái Tiệm Tạp Hóa Này </header>

<div class="grid" id="productList"></div>

<div id="detailBox" class="detail"></div>

<script src="products.js"></script>

<script>
const list = document.getElementById("productList");
const detail = document.getElementById("detailBox");

products.forEach(p => {
  list.innerHTML += `
    <div class="card" onclick="showDetail(${p.id})">
      <img src="${p.image}">
      <p>${p.name}</p>
    </div>
  `;
});

function showDetail(id){
  const p = products.find(x => x.id === id);

  detail.style.display = "block";
  detail.innerHTML = `
    <h2>${p.name}</h2>
    <iframe src="${p.video}" width="100%" height="300"></iframe>
    <p>${p.desc}</p>
    <button class="btn shopee" onclick="window.open('${p.shopee}')">Shopee</button>
    <button class="btn tiktok" onclick="window.open('${p.tiktok}')">TikTok</button>
  `;
}
</script>

</body>
</html>
